name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: energy_bill_ai
          POSTGRES_USER: energy_user
          POSTGRES_PASSWORD: energy_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U energy_user -d energy_bill_ai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://energy_user:energy_pass@localhost:5432/energy_bill_ai
      MPLCONFIGDIR: .matplotlib

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-por

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile source
        run: python -m compileall app tests scripts

      - name: Run migrations on PostgreSQL
        run: python -m alembic -c alembic.ini upgrade head

      - name: Run tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t energy-bill-ai-backend:ci .
