services:
  - type: web
    name: energy-bill-ai-backend
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_NAME
        value: Energy Bill AI Backend
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: energy-bill-ai-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SMS_PROVIDER
        value: mock
      - key: SMS_MOCK_FIXED_CODE
        value: "123456"
      - key: UPLOADS_DIR
        value: uploads
      - key: RATE_LIMIT_ENABLED
        value: true

databases:
  - name: energy-bill-ai-db
    databaseName: energy_bill_ai
    user: energy_user
    plan: free
